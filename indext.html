<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Ravi Tours · Live Ticket Price</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f0f4fa;
            color: #0b1e2f;
            padding: 1.5rem;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-card {
            max-width: 1280px;
            width: 100%;
            background: #ffffff;
            border-radius: 2.8rem;
            padding: 2.2rem 2.5rem 2rem;
            box-shadow: 0 30px 60px -20px rgba(0, 20, 40, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.2s;
        }

        /* ---------- HEADER ---------- */
        .header-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e8eff6;
            padding-bottom: 1.4rem;
            margin-bottom: 1.8rem;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .brand i {
            font-size: 2.2rem;
            color: #1a4b74;
            background: #e4edf8;
            padding: 0.6rem;
            border-radius: 18px;
        }

        .brand h1 {
            font-weight: 800;
            font-size: 2rem;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #0a2a44, #1f5a85);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .owner-badge {
            background: #e4edf8;
            padding: 0.5rem 1.6rem;
            border-radius: 60px;
            font-weight: 700;
            font-size: 0.95rem;
            color: #0a2a44;
            border: 1px solid #c4d9ef;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .owner-badge i {
            color: #b45309;
        }

        /* ---------- LIVE MARKET PRICE (big) ---------- */
        .market-live {
            background: linear-gradient(145deg, #0a2a44, #1a4b74);
            border-radius: 40px;
            padding: 1.2rem 2rem;
            margin-bottom: 2rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            color: white;
            box-shadow: 0 8px 18px rgba(10, 42, 68, 0.3);
        }

        .market-live .label {
            font-weight: 500;
            font-size: 1rem;
            opacity: 0.8;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .market-live .label i {
            font-size: 1.2rem;
            color: #ffd966;
        }

        .market-price-box {
            display: flex;
            align-items: baseline;
            gap: 12px;
            flex-wrap: wrap;
        }

        .market-price-box .price {
            font-weight: 800;
            font-size: 2.5rem;
            letter-spacing: -0.02em;
            background: rgba(255, 255, 255, 0.08);
            padding: 0.2rem 1.4rem;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            font-variant-numeric: tabular-nums;
        }

        .market-price-box .trend {
            font-weight: 600;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.12);
            padding: 0.25rem 1rem;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .trend.up { color: #7dffb3; }
        .trend.down { color: #ff9a8b; }

        .live-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #4ade80;
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse-dot 1.2s infinite;
        }

        @keyframes pulse-dot {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.85); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* ---------- INFO GRID ---------- */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 1rem;
            background: #f7faff;
            padding: 1.2rem 1.6rem;
            border-radius: 30px;
            border: 1px solid #e2ebf5;
            margin-bottom: 2rem;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
            color: #1a3855;
            font-size: 0.95rem;
        }

        .info-item i {
            width: 2rem;
            font-size: 1.2rem;
            color: #1a4b74;
            background: white;
            padding: 0.3rem;
            border-radius: 14px;
            text-align: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }

        .info-item strong { color: #0a2a44; margin-right: 3px; }
        .route-tag {
            background: #d3e3f7;
            padding: 0.15rem 1.2rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.8rem;
            color: #0a2a44;
        }

        /* ---------- AIRLINES with PRICE ---------- */
        .section-title {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 1.3rem;
            color: #0a2a44;
            margin-bottom: 1.2rem;
        }

        .section-title i { color: #1a4b74; font-size: 1.5rem; }

        .airline-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 0.9rem;
            background: #fafdff;
            padding: 1.5rem 1.2rem;
            border-radius: 30px;
            border: 1px solid #e2ebf5;
            margin-bottom: 1.8rem;
        }

        .airline-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: white;
            padding: 0.6rem 1rem 0.6rem 0.9rem;
            border-radius: 60px;
            border: 1px solid #e5eef7;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            font-weight: 600;
            font-size: 0.8rem;
            color: #1a3855;
            transition: all 0.15s;
        }

        .airline-item .airline-name {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .airline-item .airline-name i {
            color: #1a4b74;
            font-size: 0.9rem;
            width: 1.3rem;
        }

        .airline-item .ticket-price {
            font-weight: 700;
            font-size: 0.85rem;
            background: #eaf2fc;
            padding: 0.15rem 0.9rem;
            border-radius: 40px;
            color: #0a2a44;
            font-variant-numeric: tabular-nums;
            border: 1px solid #c7dbf0;
            transition: all 0.3s ease;
            min-width: 72px;
            text-align: center;
        }

        .airline-item .ticket-price.flash {
            background: #ffe7b3;
            border-color: #f5b342;
            transform: scale(0.96);
        }

        .airline-item.virtual {
            background: #e9f2fd;
            border-color: #b8d0ea;
        }

        .badge-small {
            background: #b8d0ea;
            padding: 0.05rem 0.7rem;
            border-radius: 40px;
            font-size: 0.6rem;
            font-weight: 700;
            color: #002642;
        }

        /* ---------- FOOTER ---------- */
        .footer-section {
            margin-top: 1.6rem;
            padding-top: 1.6rem;
            border-top: 2px solid #e8eff6;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 0.8rem;
        }

        .dev-sign {
            font-weight: 700;
            font-size: 1rem;
            background: #eaf2fc;
            padding: 0.4rem 2rem;
            border-radius: 60px;
            border: 1px solid #c7dbf0;
            color: #0a2a44;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .dev-sign i { color: #b45309; }

        .meta-info {
            color: #4f7297;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .update-timer {
            background: #e8eff6;
            padding: 0.2rem 1.2rem;
            border-radius: 60px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #1a4b74;
        }

        @media (max-width: 680px) {
            .main-card { padding: 1.5rem 1rem; }
            .brand h1 { font-size: 1.4rem; }
            .market-price-box .price { font-size: 1.8rem; }
            .airline-grid { grid-template-columns: 1fr; }
            .header-row { flex-direction: column; align-items: flex-start; gap: 0.8rem; }
        }
    </style>
</head>
<body>

<div class="main-card" id="app">

    <!-- HEADER -->
    <div class="header-row">
        <div class="brand">
            <i class="fas fa-globe-asia"></i>
            <h1>ravi tours &amp; travels</h1>
        </div>
        <div class="owner-badge">
            <i class="fas fa-user-tie"></i> Owner: RAZAN BHANDARY
        </div>
    </div>

    <!-- LIVE MARKET PRICE -->
    <div class="market-live">
        <div class="label">
            <i class="fas fa-chart-line"></i> 
            <span>📊 Market Index · Live</span>
            <span class="live-dot"></span>
        </div>
        <div class="market-price-box">
            <span class="price" id="marketPriceDisplay">$1,240</span>
            <span class="trend up" id="marketTrend"><i class="fas fa-arrow-up"></i> +2.4%</span>
        </div>
    </div>

    <!-- INFO GRID -->
    <div class="info-grid">
        <div class="info-item"><i class="fas fa-store"></i> <strong>Shop</strong> Jaleshwor, Nepal</div>
        <div class="info-item"><i class="fas fa-route"></i> <strong>Route</strong> <span class="route-tag">Nepal → Worldwide</span></div>
        <div class="info-item"><i class="fas fa-phone-alt"></i> <strong>Call</strong> 9809673524 / 9767718995</div>
        <div class="info-item"><i class="fas fa-ticket-alt"></i> <strong>e-ticket</strong> <span style="background:#d3e3f7; padding:0.1rem 1rem; border-radius:40px;">e-pas · VIRTUAL</span></div>
    </div>

    <!-- AIRLINES + TICKET PRICE -->
    <div class="section-title">
        <i class="fas fa-plane-departure"></i>
        <span>Partner Airlines · Live Ticket Price</span>
        <span style="margin-left:auto; font-size:0.7rem; background:#e2ebf5; padding:0.2rem 1.2rem; border-radius:40px; font-weight:600; color:#1a4b74;">
            <i class="fas fa-sync-alt fa-fw"></i> auto-update
        </span>
    </div>

    <div class="airline-grid" id="airlineGrid">
        <!-- will be populated by JS -->
    </div>

    <!-- FOOTER -->
    <div class="footer-section">
        <div class="dev-sign">
            <i class="fas fa-code"></i> developed by RAZAN BHANDARY
        </div>
        <div class="meta-info">
            <span><i class="fas fa-clock"></i> <span id="updateTimer">updating...</span></span>
            <span><i class="fas fa-tag"></i> Tour Package</span>
            <span class="update-timer"><i class="fas fa-bolt"></i> live</span>
        </div>
    </div>

</div>

<script>
    (function() {
        'use strict';

        // ----- BASE AIRLINES DATA (static names) -----
        const airlines = [
            { name: 'QATAR AIRLINES', icon: 'fa-plane' },
            { name: 'Nepal Airlines', icon: 'fa-plane' },
            { name: 'HIMALAYA AIRLINES', icon: 'fa-plane' },
            { name: 'malaysia airlines', icon: 'fa-plane' },
            { name: 'SAUDIA', icon: 'fa-plane' },
            { name: 'JAPAN AIRLINES', icon: 'fa-plane' },
            { name: 'flydubai', icon: 'fa-plane' },
            { name: 'AIR INDIA', icon: 'fa-plane' },
            { name: 'VIRTUAL', icon: 'fa-laptop', virtual: true },
            { name: 'Tour Package', icon: 'fa-bag-shopping' },
            { name: 'e-pas', icon: 'fa-ticket-alt' },
            { name: '9809673524', icon: 'fa-star', special: true }
        ];

        // ----- STATE -----
        let marketPrice = 1240;          // base market price
        let previousMarket = 1240;
        let trendDirection = 'up';
        let trendPercent = 2.4;

        // store last ticket prices for each airline
        let airlinePrices = [];

        // DOM refs
        const marketPriceDisplay = document.getElementById('marketPriceDisplay');
        const marketTrend = document.getElementById('marketTrend');
        const airlineGrid = document.getElementById('airlineGrid');
        const updateTimer = document.getElementById('updateTimer');

        // ----- HELPER: generate random ticket price based on market -----
        function generateTicketPrice(market, seedOffset = 0) {
            // each airline has slight variation: ±8% + random offset
            const variation = 0.92 + (Math.random() * 0.16); // 0.92 ~ 1.08
            const base = market * variation;
            // add small random noise
            const noise = (Math.random() - 0.5) * 40;
            let price = Math.round(base + noise + seedOffset);
            // keep within reasonable range
            if (price < 400) price = 400 + Math.floor(Math.random() * 300);
            if (price > 2800) price = 2200 + Math.floor(Math.random() * 400);
            return price;
        }

        // ----- update market price (simulate movement) -----
        function updateMarketPrice() {
            previousMarket = marketPrice;

            // random walk: change between -3.8% and +4.2%
            const changePercent = (Math.random() * 8.0) - 3.8; // -3.8% ~ +4.2%
            const change = marketPrice * (changePercent / 100);
            let newPrice = Math.round(marketPrice + change);

            // clamp to avoid extreme
            if (newPrice < 600) newPrice = 600 + Math.floor(Math.random() * 200);
            if (newPrice > 2800) newPrice = 2200 + Math.floor(Math.random() * 300);

            marketPrice = newPrice;

            // calculate trend
            const diff = marketPrice - previousMarket;
            const absDiff = Math.abs(diff);
            trendPercent = (absDiff / previousMarket) * 100;
            if (trendPercent < 0.1) trendPercent = 0.2 + Math.random() * 0.6;

            if (diff > 0) {
                trendDirection = 'up';
            } else if (diff < 0) {
                trendDirection = 'down';
            } else {
                trendDirection = (Math.random() > 0.5) ? 'up' : 'down';
                trendPercent = 0.3 + Math.random() * 0.9;
            }

            // update UI market
            marketPriceDisplay.textContent = '$' + marketPrice.toLocaleString();

            // trend UI
            const sign = (trendDirection === 'up') ? '+' : '';
            const arrow = (trendDirection === 'up') ? 'fa-arrow-up' : 'fa-arrow-down';
            marketTrend.className = `trend ${trendDirection}`;
            marketTrend.innerHTML = `<i class="fas ${arrow}"></i> ${sign}${trendPercent.toFixed(1)}%`;
        }

        // ----- refresh ALL airline ticket prices -----
        function refreshAirlinePrices() {
            // generate new prices for each airline based on current market
            airlinePrices = airlines.map((airline, index) => {
                // seed offset for consistency
                const seed = index * 13 + 7;
                let price = generateTicketPrice(marketPrice, seed);
                return {
                    name: airline.name,
                    icon: airline.icon,
                    virtual: airline.virtual || false,
                    special: airline.special || false,
                    price: price
                };
            });

            renderAirlineGrid();
        }

        // ----- render airline grid with flash effect -----
        function renderAirlineGrid() {
            let html = '';
            airlinePrices.forEach((item, idx) => {
                const virtualClass = item.virtual ? 'virtual' : '';
                const specialAttr = item.special ? ' style="background:#dce8f5;border-color:#a6c0dd;"' : '';
                const icon = item.icon || 'fa-plane';
                const displayName = item.name;

                html += `
                    <div class="airline-item ${virtualClass}" data-index="${idx}" ${specialAttr}>
                        <span class="airline-name">
                            <i class="fas ${icon}"></i> ${displayName}
                            ${item.virtual ? '<span class="badge-small">e-tick</span>' : ''}
                        </span>
                        <span class="ticket-price" id="price-${idx}">$${item.price.toLocaleString()}</span>
                    </div>
                `;
            });
            airlineGrid.innerHTML = html;

            // flash animation for all prices (visual feedback)
            document.querySelectorAll('.ticket-price').forEach(el => {
                el.classList.add('flash');
                setTimeout(() => el.classList.remove('flash'), 350);
            });

            // update timer
            const now = new Date();
            updateTimer.textContent = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        // ----- full update cycle -----
        function fullUpdate() {
            updateMarketPrice();
            refreshAirlinePrices();
        }

        // ----- init -----
        function init() {
            // initial prices
            airlinePrices = airlines.map((airline, index) => {
                const seed = index * 13 + 7;
                let price = generateTicketPrice(marketPrice, seed);
                return {
                    name: airline.name,
                    icon: airline.icon,
                    virtual: airline.virtual || false,
                    special: airline.special || false,
                    price: price
                };
            });
            renderAirlineGrid();
            marketPriceDisplay.textContent = '$' + marketPrice.toLocaleString();
            marketTrend.className = 'trend up';
            marketTrend.innerHTML = `<i class="fas fa-arrow-up"></i> +2.4%`;

            // auto update every 4.5 seconds
            setInterval(fullUpdate, 4500);

            // also update on visibility change to keep fresh
            document.addEventListener('visibilitychange', () => {
                if (!document.hidden) {
                    fullUpdate();
                }
            });
        }

        init();
    })();
</script>

</body>
</html>
